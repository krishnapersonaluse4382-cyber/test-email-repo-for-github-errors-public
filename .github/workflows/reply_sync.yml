name: "Reply Sync Engine"

on:
  schedule:
    - cron: "*/5 * * * *" # Minimum GitHub interval
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  sync-replies:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'
      - name: Debug Check
        run: |
          echo "Current working directory: $(pwd)"
          echo "Checking for project folder..."
          if [ -d "cold email automation/test email for supabase new approach" ]; then
            echo "✅ Project folder found."
          else
            echo "❌ Project folder NOT found!"
            ls -R
          fi
          echo "Checking if secrets are populated (checking length only)..."
          if [ -n "${{ secrets.SUPABASE_URL }}" ]; then echo "✅ SUPABASE_URL exists"; else echo "❌ SUPABASE_URL is MISSING"; fi
          if [ -n "${{ secrets.SUPABASE_KEY }}" ]; then echo "✅ SUPABASE_KEY exists"; else echo "❌ SUPABASE_KEY is MISSING"; fi
      - name: Install dependencies
        run: |
          cd "cold email automation/test email for supabase new approach"
          npm install
      - name: Run Reply Sync Loop (Every 60s)
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          EMAIL_USER: ${{ secrets.KRISHNA_USER }}
          EMAIL_PASS: ${{ secrets.KRISHNA_PASS }}
          RYAN_USER: ${{ secrets.RYAN_USER }}
          RYAN_PASS: ${{ secrets.RYAN_PASS }}
          RIK_USER: ${{ secrets.RIK_USER }}
          RIK_PASS: ${{ secrets.RIK_PASS }}
        run: |
          cd "cold email automation/test email for supabase new approach"
          for i in {1..5}
          do
            echo "--- Sync Run $i of 5 ---"
            node reply_sync_engine.js
            if [ $i -lt 5 ]; then
              echo "Waiting 60 seconds..."
              sleep 60
            fi
          done
