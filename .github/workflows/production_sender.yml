name: "Final Verification Send"

on:
  schedule:
    - cron: "43 8 * * *" # 2:13 PM IST (Giving 1 extra min for push)
  workflow_dispatch:

jobs:
  send-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'
      - name: Install dependencies
        run: npm install
      - name: Run Rik Test
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          RIK_USER: ${{ secrets.RIK_USER }}
          RIK_PASS: ${{ secrets.RIK_PASS }}
        run: node "cold email automation/test email for supabase new approach/test_rik_final.js"
