name: Production Email Burst

on:
  schedule:
    - cron: '*/10 * * * *' # Every 10 minutes
  workflow_dispatch: # Allows you to trigger it manually for testing

jobs:
  send-emails:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      
      - name: Install dependencies
        run: |
          cd "cold email automation/test email for supabase new approach"
          npm install

      - name: Run Sender Engine
        run: |
          cd "cold email automation/test email for supabase new approach"
          node production_sender.js
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          EMAIL_USER: ${{ secrets.EMAIL_USER }}
          EMAIL_PASS: ${{ secrets.EMAIL_PASS }}
          RYAN_USER: ${{ secrets.RYAN_USER }}
          RYAN_PASS: ${{ secrets.RYAN_PASS }}
          RIK_USER: ${{ secrets.RIK_USER }}
          RIK_PASS: ${{ secrets.RIK_PASS }}
