name: "Production Sender Engine"

on:
  schedule:
    - cron: "*/5 * * * *" # Trigger every 5 minutes (GitHub minimum)
  workflow_dispatch:

jobs:
  process-queue:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'
      - name: Install dependencies
        run: |
          cd "cold email automation/test email for supabase new approach"
          npm install
      - name: Run Sender Loop (Every 60s)
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          EMAIL_USER: ${{ secrets.EMAIL_USER }}
          EMAIL_PASS: ${{ secrets.EMAIL_PASS }}
          RYAN_USER: ${{ secrets.RYAN_USER }}
          RYAN_PASS: ${{ secrets.RYAN_PASS }}
          RIK_USER: ${{ secrets.RIK_USER }}
          RIK_PASS: ${{ secrets.RIK_PASS }}
        run: |
          cd "cold email automation/test email for supabase new approach"
          for i in {1..5}
          do
            echo "--- Run $i of 5 ---"
            node sender_engine.js
            if [ $i -lt 5 ]; then
              echo "Waiting 60 seconds..."
              sleep 60
            fi
          done
