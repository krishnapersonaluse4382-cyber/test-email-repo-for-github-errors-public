name: Comparison Test (Old Way)

on:
  workflow_dispatch: # Allows us to run it manually like you did before

jobs:
  test-send:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Install dependencies
        run: npm install

      - name: Run Test Email
        env:
          KRISHNA_PASS: ${{ secrets.KRISHNA_PASS }}
        run: node "cold email automation/Test email for github =/test_github_send.js"
